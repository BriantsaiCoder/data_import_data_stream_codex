name: CI

# .NET Framework 4.6.2 + packages.config(主專案) + SDK-style net462 xUnit(測試專案)。
# 需 Windows MSBuild;packages.config 不被 dotnet restore 還原,故用 nuget restore。
# R5 的 2 條測試是 by-design RED(釘住未修的加權和 bug),以 Category!=ByDesignRed 排除,避免 CI 假紅。
# 本 workflow 由無 Windows 環境的開發機撰寫,已於 GitHub Actions(windows-latest)實跑驗證:build + test 綠燈。

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore (packages.config + PackageReference)
        run: nuget restore DCT_data_import.sln

      - name: Build (Release)
        run: msbuild DCT_data_import.sln /p:Configuration=Release /m

      - name: Test (排除 by-design RED 的 R5 釘樁)
        run: dotnet test DCT_data_import.Tests/DCT_data_import.Tests.csproj --configuration Release --no-build --filter "Category!=ByDesignRed" --logger "console;verbosity=normal"
